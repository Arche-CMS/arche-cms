name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: cms
          POSTGRES_DB: cms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable && corepack prepare yarn@4.17.0 --activate
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn test
        env:
          PG_TEST_URL: postgres://cms:cms@localhost:5432/cms_test
      - run: yarn build
