name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable && corepack prepare yarn@4.17.0 --activate
      - run: yarn install --immutable
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - run: yarn workspace @arche-cms/docs build
        env:
          DOCS_BASE: /arche-cms/
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-org-site:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable && corepack prepare yarn@4.17.0 --activate
      - run: yarn install --immutable
      - run: yarn workspace @arche-cms/docs build
        env:
          DOCS_BASE: /
      - uses: actions/checkout@v4
        with:
          repository: Arche-CMS/.github
          token: ${{ secrets.ORG_DEPLOY_TOKEN }}
          path: org-site
      - run: |
          find org-site/ -mindepth 1 -not -name '.git' -exec rm -rf {} +
          cp -r apps/docs/.vitepress/dist/. org-site/
      - name: Commit and push to .github
        run: |
          cd org-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update org site from arche-cms docs"
          git push
